[package]
name = "ptj"
version.workspace = true
edition = "2024"

[[bin]]
name = "ptj"
path = "src/main.rs"

[dependencies]
bitcoin = "0.32"
clap = { version = "4", features = ["derive"] }
concurrent-psbt = { path = "../concurrent-psbt" }
psbt-v2 = { version = "0.3.0", features = ["base64"] }
rand = "0.9"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
