      }
    }
    return React.createElement('svg',{viewBox:'0 0 100 100',width:'100%',height:'100%',preserveAspectRatio:'xMidYMid meet',style:{display:'block'}},
      React.createElement('rect',{x:0,y:0,width:100,height:100,fill:bg}),...cells);
  }

  makeQR(){
    const rnd=this.prng(this.hash('lupa-7f3-invite'));
    const N=21, u=4.4, pad=6, cells=[];
    const finder=(gx,gy)=>{
      cells.push(React.createElement('rect',{key:'f'+gx+gy,x:gx,y:gy,width:7*u,height:7*u,rx:3,fill:'#211E17'}));
      cells.push(React.createElement('rect',{key:'g'+gx+gy,x:gx+u,y:gy+u,width:5*u,height:5*u,rx:2,fill:'#fff'}));
      cells.push(React.createElement('rect',{key:'h'+gx+gy,x:gx+2*u,y:gy+2*u,width:3*u,height:3*u,rx:1.5,fill:'#211E17'}));
    };
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      const inFinder=(r<7&&c<7)||(r<7&&c>=N-7)||(r>=N-7&&c<7);
      if(inFinder) continue;
      if(rnd()>0.52) cells.push(React.createElement('rect',{key:r+'q'+c,x:pad+c*u,y:pad+r*u,width:u-0.5,height:u-0.5,rx:1.2,fill:'#211E17'}));
    }
    finder(pad,pad); finder(pad+(N-7)*u,pad); finder(pad,pad+(N-7)*u);
    const size=pad*2+N*u;
    return React.createElement('svg',{width:168,height:168,viewBox:`0 0 ${size} ${size}`},
      React.createElement('rect',{key:'bg',x:0,y:0,width:size,height:size,fill:'#fff'}),...cells);
  }

  fp(){
    if(!this._fp){
      this._fp={
        big:this.makeFingerprint('osteria-lupa-final-214.50-v7'),
        tile:this.makeFingerprint('osteria-lupa-final-214.50-v7'),
        tileBad:this.makeFingerprint('osteria-lupa-changed-238.00-v9'),
        qr:this.makeQR(),
      };
    }
    return this._fp;
  }

  renderVals(){
    const t=Math.min(this.state.t,1);
    const share=35.75, bill=214.50;
    const landed=this.timeline.filter(x=>x.t<=t);
    const chipped=new Set(landed.map(x=>x.i));
    const contributed=Math.min(bill, landed.length*share);
    const pct=contributed/bill*100;
    const people=this.friends.map((f,i)=>{
      const isin=chipped.has(i);
      return {name:f.name,initial:f.initial,color:f.color,
        label:isin?'Chipped in':'Here',
        pillColor:isin?'#0A8F3C':'#A79A80',
        dim:isin?'1':'0.5'};
    });
    const fp=this.fp();
    return {
      ring:this.makeRing(pct),
      contributedStr:contributed.toFixed(2),
      countStr:landed.length+' of 6',
      people,
      qr:fp.qr, bigPrint:fp.big, tile:fp.tile, tileBad:fp.tileBad,
    };
  }
}
</script>
