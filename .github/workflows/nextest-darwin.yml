name: Nextest (Darwin)
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  nextest:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/nix-installer-action@33c9ab3ef95cd57c164d9d6eb1f9a46338538d41 # main
      - uses: DeterminateSystems/magic-nix-cache-action@55718cd9ebf1737a061487d5ada21abf31e99a98 # main
      - name: Run nextest
        run: nix build --no-update-lock-file '.#checks.aarch64-darwin.tests-nightly-dev'
