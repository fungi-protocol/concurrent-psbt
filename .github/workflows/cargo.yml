name: Cargo
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@107b72d3eedc12a9199c66294994400a484a89df # cargo-nextest
      - run: cargo nextest run
      # Warn-only: this toolchain is rolling (not pinned), which may cause
      # unrelated PRs to start failing due to nightly containing new lints.
      # Nix clippy checks in ci.yml, which pins the toolchain via a flake.lock,
      # and `just clippy` both use -D warnings
      - if: matrix.toolchain == 'nightly'
        run: cargo clippy --all-targets --all-features -- -W clippy::all
