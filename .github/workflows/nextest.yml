name: Tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Quick checks (tests + clippy)
        run: nix build --no-update-lock-file '.#checks.x86_64-linux.quick'
      - name: Full flake checks
        run: nix flake check --no-update-lock-file
  merge-head:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - run: |
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-edit
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Quick checks on merge head
        run: nix build --no-update-lock-file '.#checks.x86_64-linux.quick'
      - name: Full flake checks on merge head
        run: nix flake check --no-update-lock-file
