name: Update flake.lock
on:
  schedule:
    - cron: "23 7 * * 3"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
concurrency:
  group: flake-lock-update
  cancel-in-progress: false
jobs:
  update:
    name: Open flake.lock update PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Require CI-triggering service token
        env:
          GH_TOKEN_FOR_UPDATES: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
        run: |
          if [[ -z "$GH_TOKEN_FOR_UPDATES" ]]; then
            echo "GH_TOKEN_FOR_UPDATES must have Contents and Pull Requests read/write access." >&2
            exit 1
          fi
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - name: Update flake.lock and open pull request
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          base: main
          branch: auto/flake-update
          commit-msg: "chore: update flake.lock"
          pr-title: "chore: update flake.lock"
          pr-body: |
            Automated weekly flake input refresh.

            The repository-scoped service token ensures the pull request triggers the normal CI workflows.
      - name: Validate updated lock file
        uses: DeterminateSystems/flake-checker-action@de924abd783455e8429c858962b9e43062d19da1 # v13
        with:
          check-supported: "false"
          ignore-missing-flake-lock: "false"
          fail-mode: "true"
          send-statistics: "false"
