version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    groups:
      nix-inputs:
        patterns:
          - "*"
